<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>校园大亨 - 旗舰完整版</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
</head>
<body>
  <div id="gameContainer">
    <!-- 背景粒子效果 -->
    <div class="bg-particles" id="particles"></div>
    
    <!-- 顶部 HUD 资源栏 - 简化版 -->
    <div class="header">
      <div class="header-left">
        <div class="game-logo">
          <div class="logo-icon">🏫</div>
          <div class="logo-text">校园大亨</div>
        </div>
        <div class="day-badge">📅 第<span id="dayNum">1</span>天</div>
        <div class="level-badge">⭐ Lv.<span id="levelNum">1</span></div>
      </div>
      <div class="header-resources">
        <div class="resource-item gold-resource" onclick="openFinance()">
          <div class="resource-icon-wrapper">
            <svg viewBox="0 0 24 24" class="resource-icon">
              <circle cx="12" cy="12" r="10" fill="#FFD700"/>
              <text x="12" y="16" text-anchor="middle" fill="#8B4513" font-size="12" font-weight="bold">$</text>
            </svg>
          </div>
          <span class="resource-value" id="gold">100,000</span>
        </div>
        <div class="resource-item diamond-resource" onclick="openShop()">
          <div class="resource-icon-wrapper">
            <svg viewBox="0 0 24 24" class="resource-icon">
              <polygon points="12,2 22,12 12,22 2,12" fill="#00CED1"/>
              <text x="12" y="16" text-anchor="middle" fill="white" font-size="10" font-weight="bold">♦</text>
            </svg>
          </div>
          <span class="resource-value diamond" id="diamond">500</span>
        </div>
        <div class="resource-item reputation-resource">
          <div class="resource-icon-wrapper">
            <svg viewBox="0 0 24 24" class="resource-icon">
              <polygon points="12,2 15,9 22,9 16,14 18,21 12,17 6,21 8,14 2,9 9,9" fill="#FF69B4"/>
            </svg>
          </div>
          <span class="resource-value" id="reputation">50</span>
        </div>
      </div>
    </div>

    <!-- 主内容区 - 重新设计 -->
    <div class="main-content">
      <!-- 核心游戏区域 - 建筑网格 -->
      <div class="core-game-area">
        <div class="section-header">
          <h2 class="section-title">🏫 我的校园</h2>
          <div class="section-actions">
            <button class="btn-icon" onclick="toggleGridZoom()" title="缩放">🔍</button>
            <button class="btn-icon" onclick="openBuild()" title="建造">🏗️</button>
          </div>
        </div>
        
        <div class="building-grid-wrapper">
          <div class="building-grid" id="buildingGrid">
            <!-- 网格将通过 JavaScript 动态生成 -->
          </div>
        </div>
      </div>

      <!-- 快速统计面板 - 紧凑布局 -->
      <div class="quick-stats">
        <div class="stat-item">
          <span class="stat-label">💰 日收入</span>
          <span class="stat-value" id="dailyIncome">0</span>
        </div>
        <div class="stat-item">
          <span class="stat-label">😊 满意度</span>
          <span class="stat-value" id="satisfaction">80%</span>
          <div class="progress-bar-mini">
            <div class="progress-fill gold" id="satisfactionBar" style="width: 80%"></div>
          </div>
        </div>
        <div class="stat-item">
          <span class="stat-label">🏅 排名</span>
          <span class="stat-value" id="schoolRank">10/100</span>
        </div>
      </div>

      <!-- 快捷功能入口 - 分类展示 -->
      <div class="quick-actions">
        <div class="action-category">
          <h3 class="category-title">📅 日常</h3>
          <div class="action-grid">
            <div class="action-card gold gold-shine reddot" onclick="openSignIn()">
              <div class="action-icon">📅</div>
              <div class="action-name">签到</div>
            </div>
            <div class="action-card purple" onclick="openGacha()">
              <div class="action-icon">🎒</div>
              <div class="action-name">招募</div>
            </div>
            <div class="action-card blue" onclick="openStudent()">
              <div class="action-icon">👨‍🎓</div>
              <div class="action-name">学生</div>
            </div>
            <div class="action-card green" onclick="openClub()">
              <div class="action-icon">🎯</div>
              <div class="action-name">社团</div>
            </div>
          </div>
        </div>

        <div class="action-category">
          <h3 class="category-title">🏗️ 建设</h3>
          <div class="action-grid">
            <div class="action-card orange" onclick="openBuild()">
              <div class="action-icon">🏗️</div>
              <div class="action-name">建造</div>
            </div>
            <div class="action-card cyan" onclick="openTech()">
              <div class="action-icon">🔬</div>
              <div class="action-name">科技</div>
            </div>
            <div class="action-card pink" onclick="openResources()">
              <div class="action-icon">🗃️</div>
              <div class="action-name">物资</div>
            </div>
            <div class="action-card purple" onclick="openCrafting()">
              <div class="action-icon">🔧</div>
              <div class="action-name">合成</div>
            </div>
          </div>
        </div>

        <div class="action-category">
          <h3 class="category-title">🎮 扩展</h3>
          <div class="action-grid">
            <div class="action-card blue" onclick="openExplore()">
              <div class="action-icon">🧭</div>
              <div class="action-name">探索</div>
            </div>
            <div class="action-card green" onclick="openRival()">
              <div class="action-icon">🏫</div>
              <div class="action-name">校际</div>
            </div>
            <div class="action-card fire" onclick="openDefense()">
              <div class="action-icon">🛡️</div>
              <div class="action-name">防御</div>
            </div>
            <div class="action-card orange" onclick="openEvents()">
              <div class="action-icon">🎉</div>
              <div class="action-name">活动</div>
            </div>
          </div>
        </div>
      </div>

      <!-- 物资储备 - 折叠面板 -->
      <details class="resource-panel">
        <summary class="resource-panel-summary">
          <span>📦 物资储备</span>
          <span class="collapse-icon">▼</span>
        </summary>
        <div class="resource-bar" id="resourceBar">
          <div class="resource-item" title="木材">🪵 <span id="res-wood">500</span></div>
          <div class="resource-item" title="石材">🪨 <span id="res-stone">300</span></div>
          <div class="resource-item" title="铁矿">⚙️ <span id="res-iron">100</span></div>
          <div class="resource-item" title="食物">🍞 <span id="res-food">200</span></div>
          <div class="resource-item" title="水源">💧 <span id="res-water">300</span></div>
          <div class="resource-item" title="电力">⚡ <span id="res-power">100</span></div>
          <div class="resource-item rare" title="水晶">💎 <span id="res-crystal">0</span></div>
          <div class="resource-item rare" title="稀有金属">🔩 <span id="res-rareMetal">0</span></div>
        </div>
      </details>
    </div>

    <!-- 底部标签栏 - 精简为核心功能 -->
    <div class="tab-bar">
      <div class="tab-item active" id="tabHome" onclick="showTab('home')">
        <div class="tab-icon">🏠</div>
        <div class="tab-label">校园</div>
      </div>
      <div class="tab-item" id="tabStudents" onclick="showTab('students')">
        <div class="tab-icon">👨‍🎓</div>
        <div class="tab-label">学生</div>
      </div>
      <div class="tab-item" id="tabBuild" onclick="showTab('build')">
        <div class="tab-icon">🏗️</div>
        <div class="tab-label">建造</div>
      </div>
      <div class="tab-item" id="tabEvents" onclick="showTab('events')">
        <div class="tab-icon">🎉</div>
        <div class="tab-label">活动</div>
      </div>
      <div class="tab-item" id="tabMenu" onclick="showTab('menu')">
        <div class="tab-icon">⚙️</div>
        <div class="tab-label">菜单</div>
      </div>
    </div>

    <!-- 弹窗容器 -->
    <div id="modalContainer"></div>
    <div id="floatMessages"></div>
    <div id="toastContainer"></div>
  </div>

  <!-- 游戏模块加载顺序很重要 -->
  <script src="gameData.js"></script>
  <script src="gameState.js"></script>
  <script src="uiRenderer.js"></script>
  <script src="gameLoop.js"></script>
  <script src="gameLogic.js"></script>
</body>
</html>
